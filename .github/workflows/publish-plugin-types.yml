name: Publish plugin API types to npm
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.4.32). Leave empty to use the tag version.'
        required: false

jobs:
  publish:
    name: Publish @openrct2/types
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            distribution/openrct2.d.ts
            distribution/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            echo "::error::No version could be determined. Run on a tag or provide a version input."
            exit 1
          fi
          echo "version=$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        working-directory: distribution
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish
        working-directory: distribution
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
